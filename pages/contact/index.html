    <main role="main" id="main">
        <section class="container page-content fade-in" itemprop="mainContentOfPage">
              <h1 data-i18n="contact.title"></h1>
            <p class="page-subtitle" data-i18n="contact.subtitle"></p>
            <div class="contact-content">
                <div class="contact-info" itemprop="provider" itemscope itemtype="http://schema.org/Organization">
                    <meta itemprop="name" content="Legacy Concierge">
                    <h3 data-i18n="contact.contactInfo.title">Contact Information</h3>
                    <p data-i18n="contact.contactInfo.text">Contact us to learn more about how we can help you and your family.</p>
                    <ul>
                        <li itemprop="telephone"><strong>Phone:</strong> <a href="tel:+13109744517">+1 (310) 974-4517</a></li>
                        <li itemprop="address" itemscope itemtype="http://schema.org/PostalAddress"><strong>Address:</strong> <span itemprop="streetAddress">720 Wilshire Blvd Suite 300</span>, <span itemprop="addressLocality">Santa Monica</span>, <span itemprop="addressRegion">CA</span> <span itemprop="postalCode">90401</span></li>
                        <li itemprop="email"><strong>Email:</strong> <a href="mailto:info@legacyconcierge.com">info@legacyconcierge.com</a></li>
                    </ul>
                </div>
                <div class="contact-form">
                    <h3 data-i18n="contact.form.title">Send us a Message</h3>
                    <form>
                        <label for="first-name" class="sr-only" data-i18n="contact.form.firstName">First Name</label>
                        <input type="text" id="first-name" name="first-name" placeholder="First Name" data-i18n-attr="placeholder:contact.form.firstName" required aria-required="true">
                        <label for="last-name" class="sr-only" data-i18n="contact.form.lastName">Last Name</label>
                        <input type="text" id="last-name" name="last-name" placeholder="Last Name" data-i18n-attr="placeholder:contact.form.lastName" required aria-required="true">
                        <label for="email" class="sr-only" data-i18n="contact.form.email">Your Email</label>
                        <input type="email" id="email" name="email" placeholder="Your Email" data-i18n-attr="placeholder:contact.form.email" required aria-required="true">
                        <label for="phone" class="sr-only" data-i18n="contact.form.phone">Your Phone</label>
                        <input type="text" id="phone" name="phone" placeholder="Your Phone" data-i18n-attr="placeholder:contact.form.phone">
                        <label for="message" class="sr-only" data-i18n="contact.form.message">Your Message</label>
                        <textarea id="message" name="message" placeholder="Your Message" data-i18n-attr="placeholder:contact.form.message" rows="6" required aria-required="true"></textarea>
                        <button type="submit" class="cta-button" data-i18n="contact.form.submit">Submit</button>
                    </form>
                </div>
            </div>
        </section>
